# @package train

seed: 3407
compile: false

trainer:
  _target_: lightning.pytorch.Trainer
  accelerator: auto
  devices: auto
  max_epochs: 20
  deterministic: true
  precision: 32
  log_every_n_steps: 10
  enable_checkpointing: true
  default_root_dir: ${paths.output_dir}

optimizer:
  lr: 3.0e-4
  weight_decay: 1.0e-2

scheduler:
  factor: 0.5
  patience: 5
  min_lr: 3.0e-6
  monitor: valid/loss

data:
  _target_: models.dataloader.RegressionDataModule
  batch_size: 32
  num_workers: 4
  input_dim: ${model.input_dim}
  output_dim: ${model.output_dim}
  train_size: 4096
  valid_size: 1024
  test_size: 1024
  noise: 0.05
  seed: ${train.seed}
